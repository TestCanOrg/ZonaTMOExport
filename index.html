<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${seleccionTitulo}</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .topnav {
            background-color: #1e1e1e;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            flex-direction: column;
        }
        table {
            width: 80%;
            border-collapse: collapse;
            background-color: #222;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            border: 1px solid #444;
            text-align: center;
        }
        th {
            background-color: #333;
            color: #fff;
        }
        a {
            color: #1e90ff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        img {
            width: 60px;
            height: 80px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="topnav">${seleccionTitulo}</div>
    
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Título</th>
                </tr>
            </thead>
            <tbody>
                ${allItems.map(item => `
                    <tr>
                        <td><img src="${item.imageUrl}" alt="${item.title}"></td>
                        <td><a href="${item.link}" target="_blank">${item.title}</a></td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
    </div>

</body>
</html>
